<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B.E.R.B AI</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#000;
  color:#fff;
  text-align:center;
}

h1 { color:#0ff; margin-top:40px; }

input, select {
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
}

button {
  padding:12px 20px;
  background:#0ff;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

#results {
  margin-top:40px;
  display:flex;
  justify-content:center;
}

.result-box {
  background:#111;
  padding:25px;
  border-radius:15px;
  width:320px;
  box-shadow:0 0 15px rgba(0,255,255,0.2);
}

.big {
  font-size:28px;
  color:#0ff;
  margin:10px 0;
}

.stat {
  margin:8px 0;
  font-size:16px;
}

.good { color:#0f0; }
.mid { color:#ff0; }
.bad { color:#f00; }

.loading {
  font-size:18px;
  color:#0ff;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity:0.3; }
}
</style>
</head>

<body>

<h1>B.E.R.B AI Product Analyzer</h1>

<input type="text" id="productName" placeholder="Paste Product URL or Name">
<br>
<input type="number" id="cost" placeholder="Cost ($)">
<input type="number" id="shipping" placeholder="Shipping ($)">
<input type="number" id="ads" placeholder="Ads ($)">
<br>
<select id="category">
  <option value="general">General</option>
  <option value="electronics">Electronics</option>
  <option value="fashion">Fashion</option>
</select>

<br><br>
<button onclick="analyzeProduct()">Analyze</button>

<div id="results"></div>

<script>
function analyzeProduct(){
  let rawInput = document.getElementById('productName').value || "Product";

  // Clean URL
  let name = rawInput;
  if(rawInput.includes("http")){
    try {
      let url = new URL(rawInput);
      name = url.hostname.replace("www.","");
    } catch {
      name = "Product";
    }
  }

  const cost = parseFloat(document.getElementById('cost').value) || 5;
  const shipping = parseFloat(document.getElementById('shipping').value) || 3;
  const ads = parseFloat(document.getElementById('ads').value) || 5;

  document.getElementById('results').innerHTML =
    `<div class="loading">🤖 BERB is analyzing product...</div>`;

  setTimeout(()=>{

    const price = (cost+shipping+ads)*(1.8 + Math.random()*0.4);
    const profit = price - cost - shipping - ads;
    const margin = (profit/price)*100;

    const daily = profit * (3 + Math.random()*7);
    const monthly = daily * 30;
    const yearly = daily * 365;

    let colorClass = "bad";
    if(margin > 50) colorClass = "good";
    else if(margin > 30) colorClass = "mid";

    document.getElementById('results').innerHTML = `
      <div class="result-box">
        <h2>${name}</h2>

        <div class="big">$${profit.toFixed(2)} profit per sale</div>

        <div class="stat ${colorClass}">
          Margin: ${margin.toFixed(1)}%
        </div>

        <hr style="border-color:#222; margin:15px 0;">

        <div class="stat">📅 Daily: $${daily.toFixed(2)}</div>
        <div class="stat">📆 Monthly: $${monthly.toFixed(2)}</div>
        <div class="stat">📈 Yearly: $${yearly.toFixed(2)}</div>

        <hr style="border-color:#222; margin:15px 0;">

        <div class="stat">💡 Suggested Price: $${price.toFixed(2)}</div>

        <div class="stat">
          ${margin > 50 ? "🔥 Winning Product" :
            margin > 30 ? "⚠️ Decent Product" :
            "❌ Low Potential"}
        </div>
      </div>
    `;

  }, 1200); // fake AI delay

}
</script>

</body>
</html>
