<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B.E.R.B AI</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#000;
  color:#fff;
  text-align:center;
}

/* HEADER */
#header {
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:#111;
  border-bottom:2px solid #0ff;
}

#logo {
  color:#0ff;
  font-size:22px;
  font-weight:bold;
}

nav a {
  margin:0 10px;
  color:#ccc;
  text-decoration:none;
}

nav button {
  background:#0ff;
  border:none;
  padding:8px 15px;
  border-radius:6px;
}

/* HERO */
h1 { color:#0ff; margin-top:40px; }

/* INPUTS */
input, select {
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
}

button {
  padding:12px 20px;
  background:#0ff;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* RESULTS */
#results {
  margin-top:40px;
  display:flex;
  justify-content:center;
}

.result-box {
  background:#111;
  padding:25px;
  border-radius:15px;
  width:320px;
  box-shadow:0 0 15px rgba(0,255,255,0.2);
}

.big {
  font-size:28px;
  color:#0ff;
  margin:10px 0;
}

.stat {
  margin:8px 0;
}

.good { color:#0f0; }
.mid { color:#ff0; }
.bad { color:#f00; }

.loading {
  color:#0ff;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity:0.3; }
}

/* TIERS */
#tiers {
  margin-top:60px;
  display:flex;
  justify-content:center;
  gap:20px;
}

.tier {
  background:#111;
  padding:20px;
  border-radius:10px;
  width:200px;
  border:1px solid #0ff;
}
</style>
</head>

<body>

<!-- HEADER -->
<div id="header">
  <div id="logo">B.E.R.B</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Features</a>
    <a href="#">Pricing</a>
    <button>Start Free Trial</button>
  </nav>
</div>

<h1>Find Winning Products with AI</h1>

<!-- ANALYZER -->
<div>
  <input type="text" id="productName" placeholder="Paste Product URL or Name"><br>
  <input type="number" id="cost" placeholder="Cost">
  <input type="number" id="shipping" placeholder="Shipping">
  <input type="number" id="ads" placeholder="Ads"><br>
  <select id="category">
    <option>General</option>
    <option>Electronics</option>
    <option>Fashion</option>
  </select><br><br>

  <button onclick="analyzeProduct()">Analyze Product</button>
</div>

<div id="results"></div>

<!-- TIERS -->
<div id="tiers">
  <div class="tier">
    <h3>Starter</h3>
    <p>1 Week Free Trial</p>
    <p>$5/month</p>
    <button>Start</button>
  </div>

  <div class="tier">
    <h3>Pro</h3>
    <p>Unlimited Analysis</p>
    <p>$15/month</p>
    <button>Upgrade</button>
  </div>
</div>

<script>
function analyzeProduct(){
  let rawInput = document.getElementById('productName').value || "Product";

  let name = rawInput;
  if(rawInput.includes("http")){
    try {
      let url = new URL(rawInput);
      name = url.hostname.replace("www.","");
    } catch {
      name = "Product";
    }
  }

  const cost = parseFloat(document.getElementById('cost').value) || 5;
  const shipping = parseFloat(document.getElementById('shipping').value) || 3;
  const ads = parseFloat(document.getElementById('ads').value) || 5;

  document.getElementById('results').innerHTML =
    `<div class="loading">🤖 BERB analyzing...</div>`;

  setTimeout(()=>{

    const price = (cost+shipping+ads)*(1.8 + Math.random()*0.4);
    const profit = price - cost - shipping - ads;
    const margin = (profit/price)*100;

    const daily = profit * (3 + Math.random()*7);
    const monthly = daily * 30;
    const yearly = daily * 365;

    let color = "bad";
    if(margin > 50) color = "good";
    else if(margin > 30) color = "mid";

    document.getElementById('results').innerHTML = `
      <div class="result-box">
        <h2>${name}</h2>

        <div class="big">$${profit.toFixed(2)} / sale</div>

        <div class="stat ${color}">
          Margin: ${margin.toFixed(1)}%
        </div>

        <hr style="border-color:#222;">

        <div class="stat">Daily: $${daily.toFixed(2)}</div>
        <div class="stat">Monthly: $${monthly.toFixed(2)}</div>
        <div class="stat">Yearly: $${yearly.toFixed(2)}</div>

        <hr style="border-color:#222;">

        <div class="stat">Suggested Price: $${price.toFixed(2)}</div>

        <div class="stat">
          ${margin > 50 ? "🔥 Winning Product" :
            margin > 30 ? "⚠️ Decent" :
            "❌ Weak"}
        </div>
      </div>
    `;

  }, 1000);
}
</script>

</body>
</html>
